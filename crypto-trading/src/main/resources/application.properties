# Spring config & H2 db config
spring.application.name=crypto-trading
spring.datasource.url=jdbc:h2:mem:tradingdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=true
# Run data.sql
spring.jpa.defer-datasource-initialization=true 
# price aggregation url
binance.url=https://api.binance.com/api/v3/ticker/bookTicker
houbi.url=https://api.huobi.pro/market/tickers
#Kafka
kafka.price.topic=crypto-prices
kafka.price.group=crypto-price-group
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.tradingsignal.cryptotrading.dtos