# Spring config & H2 db config
spring.application.name=crypto-trading
spring.datasource.url=jdbc:h2:mem:tradingdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=true

# price aggregation url
binance.url=https://api.binance.com/api/v3/ticker/bookTicker
houbi.url=https://api.huobi.pro/market/tickers